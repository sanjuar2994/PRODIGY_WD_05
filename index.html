<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #a3c8ea;
            --shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
            --inner-shadow: inset 6px 6px 10px -1px rgba(0,0,0,0.15), inset -6px -6px 10px rgba(255,255,255,0.7);
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #444;
        }

        .card {
            background: var(--bg-color);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            width: 350px;
            text-align: center;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--bg-color);
            box-shadow: var(--inner-shadow);
            outline: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: var(--bg-color);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { box-shadow: var(--inner-shadow); }

        .weather-icon { font-size: 4rem; margin: 20px 0; color: #6d5dfc; }
        .temp { font-size: 3rem; font-weight: 600; }
        .details { display: flex; justify-content: space-around; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="search-container">
            <input type="text" id="cityInput" placeholder="Enter city...">
            <button onclick="getWeather()"><i class="fas fa-search"></i></button>
        </div>

        <div id="display">
            <h2 id="cityName">--</h2>
            <div class="weather-icon"><i class="fas fa-cloud-sun" id="icon"></i></div>
            <div class="temp" id="temp">--°C</div>
            <p id="desc">--</p>
            <div class="details">
                <div><i class="fas fa-tint"></i> <span id="hum">--</span>%</div>
                <div><i class="fas fa-wind"></i> <span id="wind">--</span> km/h</div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'enter your api key'; // Replace with your key

        async function getWeather() {
            const city = document.getElementById('cityInput').value || 'London';
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`);
                const data = await res.json();
                
                document.getElementById('cityName').innerText = data.name;
                document.getElementById('temp').innerText = `${Math.round(data.main.temp)}°C`;
                document.getElementById('desc').innerText = data.weather[0].main;
                document.getElementById('hum').innerText = data.main.humidity;
                document.getElementById('wind').innerText = data.wind.speed;
            } catch (err) {
                alert("City not found");
            }
        }
    </script>
</body>
</html>
